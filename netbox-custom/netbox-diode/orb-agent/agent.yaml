orb:
  config_manager:
    active: local
  backends:
    network_discovery: {} # Ativa o módulo de varredura de rede (nmap)
    device_discovery: {}   # Ativa o módulo de investigação de dispositivos (NAPALM) - obs: o módulo network_discovery é obrigatório para fazer o nmap dos ips na rede
    snmp_discovery: {}          # Ativa o backend para SNMP
    common:
      diode:
        target: grpc://192.168.249.175:8080/diode  # Endereço do servidor Diode
        client_id: orb-agent-4aa291cc8012489f      # Seu client_id gerado no plugin do diode no netbox
        client_secret: FlWaF2mkYJnXDR9xw+sQNB7prbOXN481g1Aw2Q6uPRg= # Seu client_secret gerado no plugin do diode no netbox
        agent_name: orb-agent  # O Client name gerado no plugin do diode no netbox
  policies:
    network_discovery:
      mapeamento_das_redes: # Nome sugestivo para a política
        config:
          schedule: "* * * * *"  # Executa a cada 1 minuto (bom para testes)
          timeout: 10
        scope:
          targets: # LISTA DE TODAS AS REDES
            - "192.168.249.0/24"

    # política para descoberta SNMP
    snmp_discovery:
      minha_rede_snmp:
        config:
          schedule: "* * * * *"   # A cada 1 minutos
          timeout: 300              # Timeout total da política (segundos)
          snmp_timeout: 10          # Timeout para cada operação SNMP
          retries: 3                # Tentativas em caso de falha
          defaults:
            # site: "Data Center"
            role: "switch"
            tags: ["snmp-discovery", "orb-agent"]
        scope:
          targets:
            - host: "192.168.249.0/24"  # Sub-rede a ser escaneada
          # Autenticação SNMP (pode ser sobrescrita por target)
          authentication:
            protocol_version: "SNMPv2c"
            community: "device_finder"         # ⚠️ Use ${SNMP_COMMUNITY} para segurança

    device_discovery:
      cisco_credencials:          # nome sugestivo para a politica
        config:
          schedule: "* * * * *"  # Executa a cada 1 minuto (bom para testes)
          defaults:
            site: 'orb-agent'
        scope:
          # Aqui você NÃO PRECISA listar os IPs!
          # Basta definir as sub-redes e ranges, e o orb-agent fará o resto.
          # O driver é OMITIDO de propósito para que o NAPALM tente todos os
          # drivers disponíveis (ios, junos, nxos, etc.) automaticamente[reference:0].
          - hostname: "192.168.249.0/24" # Range de IP
            username: 'cisco'
            password: 'cisco'          # Aqui você NÃO PRECISA listar os IPs!
            key: 'credenciais_cisco'

      admin_credencials:
          config:
            schedule: "* * * * *"
            defaults:
              site: 'orb-agent'
          scope:
            - hostname: "192.168.249.0/24"
              username: 'admin'
              password: 'admin'
              key: 'credenciais_admin'