services:

  netbox:
    build:
      context: .
      dockerfile: Dockerfile-Plugins
    image: netbox-with-diode:latest
    restart: unless-stopped
    pull_policy: never
    environment:
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: Admin@1234567890
      SKIP_SUPERUSER: "false"  # Garante a criação (padrão é false)
      # O NetBox e o Django utilizam esta variável para
      # formatar datas e horas na interface web e no banco de dados.
      TIME_ZONE: "America/Sao_Paulo"
    ports:
      - "8000:8080"
    healthcheck:
      start_period: 400s
      timeout: 30s
      interval: 30s
      retries: 5

  netbox-worker:
    image: netbox-with-diode:latest
    build:
      context: .
      dockerfile: Dockerfile-Plugins
    restart: unless-stopped
    pull_policy: never

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  redis-cache:
    restart: unless-stopped