services:
  netbox:
    image: netboxcommunity/netbox:v4.5.8-4.0.2
    restart: unless-stopped
    ports:
      - "8000:8080"
    healthcheck:
      start_period: 400s
      timeout: 30s
      interval: 30s
      retries: 5
  netbox-worker:
    image: netboxcommunity/netbox:v4.5.8-4.0.2
    restart: unless-stopped
